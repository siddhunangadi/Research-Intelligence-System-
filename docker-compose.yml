version: '3.8'

services:
  # 1. Relational Metadata Store (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: ris-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d research_rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 2. FastAPI API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ris-fastapi-backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/research_rag
      - CHROMA_DB_PATH=/app/data/chroma_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 3. Streamlit User Interface
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ris-streamlit-ui
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/research_rag
      - CHROMA_DB_PATH=/app/data/chroma_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BACKEND_API_URL=http://api:8000
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
